services:
  db:
    image: "postgres:16-alpine"
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres:/var/lib/postgresql/data

  app:
    build: .
    command: bash start.sh
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DB_PASSWORD: postgres
    volumes:
      - .:/onebitexchange
      - gems:/gems
      - node_modules:/onebitexchange/node_modules
    depends_on:
      - db

volumes:
  postgres:
  gems:
  node_modules:
